# config.yaml — PE Target Screener
# All scoring weights, classification thresholds, and assumptions.
# Modify here — no code changes needed.

# -------------------------------------------------------------------
# Scoring weights (must sum to 1.0)
# -------------------------------------------------------------------
weights:
  ebitda_margin: 0.15       # Profitability
  roic: 0.10                # Capital efficiency
  fcf_conversion: 0.15      # Cash quality
  ocf_margin: 0.10          # Cash profitability
  net_debt_to_ebitda: 0.10  # Leverage headroom (lower = better)
  interest_coverage: 0.10   # Debt service capacity
  revenue_growth: 0.10      # Growth trajectory
  ebitda_growth: 0.00       # Earnings momentum (weight moved to fcf_yield_ev)
  ev_to_ebitda: 0.15        # Entry valuation attractiveness (lower = better)
  fcf_yield_ev: 0.05        # FCF yield on EV — real cash return vs price paid

# -------------------------------------------------------------------
# Scoring blend parameters
# -------------------------------------------------------------------
scoring:
  sector_weight: 0.60            # Weight on sector-relative rank
  universe_weight: 0.40          # Weight on universe-wide rank
  irr_blend_quality: 0.60        # Weight on pe_score_adjusted in final score
  irr_blend_irr: 0.40            # Weight on irr_score in final score
  hurdle_penalty_mult: 0.40      # Multiplier for sub-hurdle IRR (60% reduction)
  hurdle_rate: 0.10              # IRR below this triggers hurdle penalty

# -------------------------------------------------------------------
# Metrics where LOWER value = BETTER (ranking will be inverted)
# -------------------------------------------------------------------
invert_metrics:
  - net_debt_to_ebitda
  - ev_to_ebitda

# -------------------------------------------------------------------
# Debt capacity classification thresholds
# -------------------------------------------------------------------
debt_capacity:
  high:
    min_ebitda_margin: 0.20       # > 20%
    min_fcf_conversion: 0.70      # > 70%
    max_net_debt_to_ebitda: 2.5   # < 2.5x
    min_interest_coverage: 5.0    # > 5x
  low:
    max_ebitda_margin: 0.10       # < 10%
    max_net_debt_to_ebitda: 4.0   # > 4x
    max_interest_coverage: 2.5    # < 2.5x

# -------------------------------------------------------------------
# Red flag thresholds (used by both flag detection AND score penalties)
# -------------------------------------------------------------------
red_flags:
  max_interest_coverage: 2.0      # Below this = flag
  max_net_debt_to_ebitda: 5.0     # Above this = flag
  min_fcf_conversion: 0.30        # Below this = flag
  min_revenue_growth: -0.05       # Below this = flag (negative growth)
  max_ev_to_ebitda: 20.0          # Above this = flag (too expensive)
  max_capex_to_revenue: 0.15      # Above this = flag (capex heavy)

# -------------------------------------------------------------------
# Red flag penalty magnitudes (points subtracted per triggered flag)
# -------------------------------------------------------------------
red_flag_penalties:
  negative_ebitda: -10            # Structural loss-maker
  low_interest_coverage: -10      # Can barely service existing debt
  high_leverage: -8               # Dangerously leveraged already
  weak_fcf_conversion: -8         # Poor cash generation
  negative_growth: -5             # Declining business
  expensive_valuation: -5         # Too expensive for LBO
  high_capex: -5                  # Capital intensive — hurts debt service

# -------------------------------------------------------------------
# Valuation penalty tiers (EV/EBITDA thresholds and point deductions)
# -------------------------------------------------------------------
valuation_penalties:
  tiers:
    - threshold: 18.0             # > 18x → deal almost certainly can't generate 20%+ IRR
      penalty: -15
    - threshold: 14.0             # > 14x → stretched — needs significant growth
      penalty: -8
    - threshold: 12.0             # > 12x → slightly above LBO sweet spot
      penalty: -3

# -------------------------------------------------------------------
# Eligibility filters (applied before scoring)
# Applied when filter_ineligible: true in main.py
# -------------------------------------------------------------------
eligibility:
  min_revenue: 100_000_000        # $100M minimum revenue
  min_ebitda: 10_000_000          # $10M minimum EBITDA
  min_ebitda_margin: 0.05         # 5% minimum EBITDA margin
  min_interest_coverage: 1.5      # Must be able to service existing debt
  exclude_sectors:
    - Financials
    - Real Estate
    - Utilities                   # Capital-heavy, different valuation logic

# -------------------------------------------------------------------
# Financial assumptions
# -------------------------------------------------------------------
assumptions:
  tax_rate: 0.25                  # 25% effective tax rate for NOPAT
  min_invested_capital: 1         # Avoid division by zero in ROIC

# -------------------------------------------------------------------
# Output settings
# -------------------------------------------------------------------
output:
  top_n: 20                       # Number of top candidates to highlight
  export_csv: true
  export_excel: true
  output_dir: outputs/

# -------------------------------------------------------------------
# LBO return estimation parameters
# -------------------------------------------------------------------
lbo:
  target_leverage: 3.5          # EBITDA multiple for max debt capacity (conservative)
  holding_period: 5             # Years to exit
  exit_multiple: 8.0            # EV/EBITDA at exit — base case cap (realistic)
  exit_multiple_min: 7.0        # Downside scenario exit cap
  exit_multiple_max: 12.0       # Upside scenario exit cap
  debt_repayment_rate: 0.4      # Annual FCF fraction swept to principal (remaining 60% covers interest + other costs)
  debt_interest_rate: 0.07      # Reference rate only — not applied separately (bundled into debt_repayment_rate assumption)

# -------------------------------------------------------------------
# Data source
# -------------------------------------------------------------------
data:
  universe_file: data/sample/universe_tickers.csv
  raw_output: data/raw/companies_raw.csv
  processed_output: data/processed/companies_scored.csv
